<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nippon Select - 日本代購計算</title>
    <style>
        :root {
            --brand-primary: #cc0000;
            --brand-primary-hover: #a00000;
            --brand-bg: #fffafa;
            --brand-text: #2c2c2c;
            --brand-accent: #f06292;
            --box-shadow: 0 5px 15px rgba(204, 0, 0, 0.08);
        }

        body { 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: var(--brand-bg); 
            display: flex; 
            justify-content: center; 
            align-items: flex-start;
            padding: 20px; 
            color: var(--brand-text);
            margin: 0;
            overflow-x: hidden;
        }

        .toggle-sidebar-btn {
            position: fixed;
            left: 20px; top: 20px; 
            background-color: var(--brand-primary);
            color: white; border: none;
            border-radius: 50%;
            width: 45px; height: 45px;
            cursor: pointer; font-size: 18px;
            z-index: 1000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            display: flex; align-items: center; justify-content: center;
        }

        .page-layout { display: flex; width: 100%; max-width: 1200px; justify-content: center; }

        .sidebar-spacer {
            width: 0;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            flex-shrink: 0;
        }
        .sidebar-spacer.open { width: 350px; }

        .sidebar {
            background: #ffffff;
            border-radius: 12px;
            box-shadow: var(--box-shadow);
            width: 0; padding: 0; opacity: 0;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: fixed; 
            left: 20px; top: 20px;
            z-index: 999;
            display: flex; flex-direction: column;
        }
        .sidebar.open { width: 330px; padding: 25px; opacity: 1; max-height: calc(100vh - 40px); }

        .sidebar-header {
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px dashed #E0E0E0;
            padding-bottom: 15px; margin-bottom: 15px;
        }

        .saved-list-container { flex: 1; overflow-y: auto; }
        
        .saved-item {
            background: #ffffff; border: 1px solid #E0E0E0;
            border-radius: 8px; margin-bottom: 12px;
            position: relative; padding: 12px;
        }

        .editable-text { outline: none; border-radius: 4px; padding: 2px 4px; }
        .editable-text:hover { background-color: #fff0f0; }

        .main-container { display: flex; gap: 25px; width: 100%; max-width: 900px; flex-wrap: wrap; justify-content: center; }
        .calculator, .result { background: #ffffff; padding: 30px; border-radius: 12px; box-shadow: var(--box-shadow); flex: 1; min-width: 320px; box-sizing: border-box; }
        .result { border: 2px solid var(--brand-primary); }
        .result.waiting { opacity: 0.5; filter: grayscale(1); }

        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; }
        input { width: 100%; padding: 10px; border: 1px solid #E0E0E0; border-radius: 6px; box-sizing: border-box; }
        
        .primary-btn { width: 100%; padding: 15px; background: var(--brand-primary); color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .save-btn { width: 100%; padding: 12px; background: var(--brand-text); color: white; border: none; border-radius: 6px; cursor: pointer; margin-top: 10px; }
        
        .del-btn { position: absolute; right: 8px; top: 8px; cursor: pointer; color: var(--brand-primary); font-size: 14px; }
    </style>
</head>
<body>

    <button class="toggle-sidebar-btn" id="historyBtn" onclick="toggleSidebar()">☰</button>

    <div class="page-layout">
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h3 style="margin:0; font-size:16px;">Nippon Select 歷史紀錄</h3>
                <span style="cursor:pointer" onclick="toggleSidebar()">✖</span>
            </div>
            <div class="saved-list-container" id="savedList"></div>
        </div>

        <div class="sidebar-spacer" id="sidebarSpacer"></div>

        <div class="main-container">
            <div class="calculator">
                <h2>代購計算機</h2>
                <div class="input-group">
                    <label>商品原價 (JPY ¥)</label>
                    <input type="number" id="price" placeholder="輸入日幣金額">
                </div>
                <div class="input-group">
                    <label>利潤 (%)</label>
                    <input type="number" id="serviceFee" value="10">
                </div>
                <div class="input-group">
                    <label>商品重量 (g)</label>
                    <input type="number" id="weight" placeholder="克重" oninput="calculateWeightFee()">
                    <small id="weightFeeDisplay" style="color:var(--brand-primary)">= 0 元</small>
                </div>
                <button class="primary-btn" onclick="calculateTotal()">立即計算總價</button>
            </div>

            <div class="result waiting" id="resultBox">
                <h3>📝 報價結果</h3>
                <p style="display:flex; justify-content:space-between"><span>預估運費：</span> <span id="resIntlShipping">0 元</span></p>
                <p style="display:flex; justify-content:space-between; font-weight:bold; color:var(--brand-primary); font-size:22px;">
                    <span>總賣價：</span> <span id="resTotal">0 元</span>
                </p>
                <div style="margin-top:20px;">
                    <input type="text" id="quoteName" placeholder="輸入商品名稱">
                    <button class="save-btn" onclick="saveToSidebar()">💾 直接儲存 (不詢問)</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 初始化載入
        window.onload = () => {
            loadFromStorage();
            // 關鍵：記憶側邊欄狀態
            const isSidebarOpen = localStorage.getItem('sidebarOpen') === 'true';
            if (isSidebarOpen) {
                toggleSidebar(true);
            }
        };

        function calculateWeightFee() {
            const weight = parseFloat(document.getElementById('weight').value) || 0;
            document.getElementById('weightFeeDisplay').innerText = '= ' + Math.round(weight * 0.25) + ' 元';
        }

        function calculateTotal() {
            const price = parseFloat(document.getElementById('price').value) || 0;
            const feePercent = parseFloat(document.getElementById('serviceFee').value) || 0;
            const weight = parseFloat(document.getElementById('weight').value) || 0;

            const itemTWD = Math.round(price * 0.21);
            const intlTWD = Math.round(weight * 0.25);
            const profit = Math.round(itemTWD * (feePercent / 100));
            const total = itemTWD + intlTWD + profit + 60; // 預設含60運費

            document.getElementById('resIntlShipping').innerText = intlTWD + ' 元';
            document.getElementById('resTotal').innerText = total + ' 元';
            document.getElementById('resultBox').classList.remove('waiting');
        }

        function toggleSidebar(forceOpen = false) {
            const sidebar = document.getElementById('sidebar');
            const spacer = document.getElementById('sidebarSpacer');
            const btn = document.getElementById('historyBtn');
            
            // 如果是強制開啟（初始化時），或是正常的切換
            const isOpen = forceOpen ? true : sidebar.classList.toggle('open');
            if (forceOpen) sidebar.classList.add('open');
            
            spacer.classList.toggle('open', isOpen);
            btn.style.display = isOpen ? 'none' : 'flex';
            
            // 存入 localStorage
            localStorage.setItem('sidebarOpen', isOpen);
        }

        function saveToSidebar() {
            const name = document.getElementById('quoteName').value.trim() || "未命名商品";
            const total = document.getElementById('resTotal').innerText;
            if (total === '0 元') return;

            const id = 'ID_' + Date.now();
            renderItem(id, name, total);
            saveData();
            
            document.getElementById('quoteName').value = '';
            // 儲存後自動開啟側邊欄（如果不小心關掉了）
            if (!document.getElementById('sidebar').classList.contains('open')) {
                toggleSidebar();
            }
        }

        function renderItem(id, name, total) {
            const container = document.getElementById('savedList');
            const div = document.createElement('div');
            div.className = 'saved-item';
            div.id = id;
            div.innerHTML = `
                <span class="del-btn" onclick="deleteItem('${id}')">✖</span>
                <div class="editable-text" contenteditable="true" onblur="saveData()" style="font-weight:bold">${name}</div>
                <div style="color:var(--brand-primary); font-weight:bold; margin-top:4px;">${total}</div>
            `;
            container.prepend(div);
        }

        function deleteItem(id) {
            // 移除確認視窗，直接刪除
            const el = document.getElementById(id);
            if (el) el.remove();
            saveData();
        }

        function saveData() {
            const items = [];
            document.querySelectorAll('.saved-item').forEach(el => {
                items.push({
                    id: el.id,
                    name: el.querySelector('.editable-text').innerText,
                    total: el.querySelector('div[style*="color:var(--brand-primary)"]').innerText
                });
            });
            localStorage.setItem('nipponSelectQuotes', JSON.stringify(items));
        }

        function loadFromStorage() {
            const data = JSON.parse(localStorage.getItem('nipponSelectQuotes') || '[]');
            data.reverse().forEach(q => renderItem(q.id, q.name, q.total));
        }
    </script>
</body>
</html>
