<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta id="viewportMeta" name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"> 
    <title>Nippon Select</title>
    <style>
        /* ================= 變數與主題 ================= */
        body.theme-jp {
            --brand-primary: #cc0000;
            --brand-primary-hover: #a00000;
            --brand-bg: #fffafa;
            --brand-text: #2c2c2c;
            --brand-accent: #f06292;
            --box-shadow: 0 10px 30px rgba(204, 0, 0, 0.05);
        }

        /* ================= 共用基礎 ================= */
        body { 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            background-color: var(--brand-bg); 
            display: flex; justify-content: center; align-items: flex-start;
            padding: 20px; color: var(--brand-text); margin: 0; overflow-x: hidden;
            transition: background-color 0.3s ease;
        }

        .app-container { display: none; width: 100%; }
        .app-container.active { display: block; }

        .view-switch-btn {
            position: fixed; right: 20px; top: 20px; height: 45px;      
            display: flex; align-items: center; justify-content: center;
            background-color: #f5f5f5; color: #666666; border: 1px solid #dcdcdc; 
            padding: 0 16px; border-radius: 25px; font-size: 14px; font-weight: bold;
            cursor: pointer; z-index: 1000; transition: all 0.3s ease; box-sizing: border-box;
        }
        .view-switch-btn.top-hidden { opacity: 0; visibility: hidden; transform: translateY(-50px); }

        .toggle-sidebar-btn {
            position: fixed; left: 20px; top: 20px; height: 45px; width: 45px;  
            background-color: var(--brand-primary); color: white; border: none;
            border-radius: 50%; cursor: pointer; font-size: 18px; z-index: 1000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15); display: flex; align-items: center; justify-content: center;
            transition: all 0.3s ease;
        }
        .toggle-sidebar-btn.hidden { opacity: 0; visibility: hidden; transform: scale(0.5); }
        .toggle-sidebar-btn.scroll-hidden { opacity: 0; visibility: hidden; transform: translateY(-100px); }

        @media (max-width: 900px) {
            .toggle-sidebar-btn, .view-switch-btn { top: 15px; height: 36px; }
            .toggle-sidebar-btn { width: 36px; left: 15px; }
            .view-switch-btn { right: 15px; padding: 0 12px; font-size: 13px; }
        }

        .page-layout { display: flex; width: 100%; align-items: flex-start; justify-content: center; }
        .sidebar-spacer { width: 0; transition: width 0.5s cubic-bezier(0.2, 0.8, 0.2, 1); flex-shrink: 0; }
        .sidebar-spacer.open { width: 370px; }
        @media (max-width: 900px) { .sidebar-spacer.open { width: 0 !important; } }

        /* ================= 記事本樣式 ================= */
        .sidebar {
            background: #ffffff; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 350px; max-width: 85vw; padding: 25px; 
            opacity: 0; visibility: hidden; transform: translateX(-110%); 
            transition: all 0.5s cubic-bezier(0.2, 0.8, 0.2, 1); box-sizing: border-box;
            display: flex; flex-direction: column; position: fixed; left: 20px; top: 20px; 
            z-index: 99999; max-height: calc(100vh - 40px); 
        }
        .sidebar.open { opacity: 1; visibility: visible; transform: translateX(0); }
        .sidebar-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px dashed #E0D8D0; padding-bottom: 20px; margin-bottom: 20px; }
        .sidebar-header h3 { margin: 0; font-size: 18px; color: #4A4036; font-weight: bold; }
        .close-btn { cursor: pointer; color: var(--brand-primary); font-size: 20px; }
        .saved-list-container { flex: 1; overflow-y: auto; }
        
        .editable-text { outline: none; padding: 2px 4px; border-radius: 4px; transition: background 0.2s; }
        .editable-text:focus { background: #f0f0f0; border-bottom: 1px dashed var(--brand-primary); }
        
        .saved-item { background: #FCFAFA; border: 1px solid #E0D8D0; border-radius: 12px; padding: 15px; margin-bottom: 15px; position: relative; display: flex; align-items: flex-start; gap: 12px; box-sizing: border-box; }
        .item-content { flex: 1; display: flex; flex-direction: column; gap: 6px; text-align: left; overflow: hidden; }
        
        .item-title-row { display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 10px; width: 100%; }
        .quote-name { font-size: 14px !important; color: #4A4036; flex: 1; min-width: 120px; word-break: break-all; font-weight: bold; }
        
        .item-price-row { display: flex; flex-direction: column; gap: 4px; }
        .quote-cost { font-size: 14px; color: #9A8C7F; display: block; }
        
        .sell-profit-group { display: flex; align-items: center; gap: 12px; }
        .quote-total { font-size: 16px; color: var(--brand-primary); font-weight: bold; }
        
        .quote-profit-label { font-size: 16px; color: #666; font-weight: normal; }
        .quote-profit-val { font-size: 16px; color: #2e7d32; font-weight: bold; }

        .item-action-btns { display: flex; gap: 8px; flex-shrink: 0; margin-left: auto; }
        .copy-btn, .del-btn { cursor: pointer; font-size: 16px; transition: opacity 0.2s; }
        .copy-btn { color: #D5C9BE; }
        .del-btn { color: var(--brand-primary); }
        
        .drag-handle { color: #D5C9BE; cursor: grab; font-size: 20px; user-select: none; }

        /* ================= 主要計算機 ================= */
        .main-container { display: flex; gap: 25px; width: 100%; max-width: 900px; flex-wrap: wrap; justify-content: center; margin-top: 50px; transition: all 0.3s ease; }
        body.force-mobile .main-container { flex-direction: column !important; align-items: center !important; max-width: 450px !important; }
        body.force-desktop .main-container { flex-direction: row !important; flex-wrap: nowrap !important; max-width: 900px !important; align-items: flex-start !important; }
        .calculator, .result { background: #ffffff; padding: 35px; border-radius: 12px; box-shadow: var(--box-shadow); flex: 1; min-width: 320px; box-sizing: border-box; }
        h2, h3 { text-align: center; margin-top: 0; color: var(--brand-text); width: 100%; font-size: 24px; font-weight: 800; margin-bottom: 25px; }
        h2::before, h3::before { content: "▫️ "; font-size: 14px; color: var(--brand-primary); }
        @media (max-width: 480px) { h2 { font-size: 20px !important; white-space: nowrap !important; letter-spacing: -0.5px; } }
        .input-group { margin-bottom: 20px; text-align: left; }
        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 14.5px; color: var(--brand-text); }
        input[type="number"], select, input[type="text"] { width: 100%; padding: 12px; border: 1px solid #E0D8D0; border-radius: 6px; box-sizing: border-box; font-size: 16px; height: 46px; background-color: #FCFAFA; }
        .option-group { display: flex; gap: 12px; margin-bottom: 12px; flex-wrap: nowrap !important; }
        .option-label { font-weight: normal; display: flex; align-items: center; gap: 5px; cursor: pointer; font-size: 14px; white-space: nowrap; }
        input[type="radio"], .round-checkbox { width: 18px; height: 18px; accent-color: var(--brand-primary); cursor: pointer; appearance: none; -webkit-appearance: none; border: 1px solid #ccc; border-radius: 50%; background: #fff; display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; }
        input[type="radio"]:checked, .round-checkbox:checked { background: var(--brand-primary); border-color: var(--brand-primary); }
        input[type="radio"]:checked::after, .round-checkbox:checked::after { content: ""; width: 8px; height: 8px; background: #fff; border-radius: 50%; display: block; }
        .inline-calc-container { display: flex; align-items: center; gap: 8px; width: 100%; }
        .inline-calc-result { color: var(--brand-primary); font-weight: bold; white-space: nowrap; font-size: 15px; }
        .ship-flex-row { display: flex; gap: 8px; flex-wrap: nowrap; margin-top: 5px; align-items: flex-start; }
        #localShipBox_jp { flex: 1.1; } #japanShipBox_jp { flex: 1.6; }

        @keyframes resultFlash {
            0% { transform: scale(0.97); opacity: 0.8; }
            50% { transform: scale(1.03); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }
        .result-animate { animation: resultFlash 0.4s ease-out; }
        .primary-btn { width: 100%; padding: 15px; background-color: var(--brand-primary); color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 15px; transition: 0.2s; }
        .primary-btn:active { transform: scale(0.96); }
        .primary-btn:hover { background-color: var(--brand-primary-hover); }

        .result { border: 2px solid var(--brand-primary); position: relative; }
        .result.waiting { opacity: 0.4; filter: grayscale(1); border-color: #E0D8D0; }
        .result p { margin: 16px 0; display: flex; justify-content: space-between; font-size: 16px; }
        .total-price { font-size: 24px; font-weight: bold; color: var(--brand-primary) !important; }
        .save-section { margin-top: auto; padding-top: 25px; border-top: 2px dashed #E0E0E0; display: flex; flex-direction: column; gap: 12px; }
        .save-btn { width: 100%; padding: 12px; background-color: var(--brand-text); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .save-btn:disabled { background-color: #E0E0E0; color: #A0A0A0; cursor: not-allowed; }

        .hidden-box { display: none !important; }
        @media (max-width: 900px) { .main-container { flex-direction: column; max-width: 450px; } }
    </style>
</head>
<body class="theme-jp">

    <div id="app-jp" class="app-container active">
        <button class="view-switch-btn" id="viewSwitchBtn_jp" onclick="toggleViewMode_jp()">💻 電腦版</button>
        <button class="toggle-sidebar-btn" id="historyBtn_jp" onclick="toggleSidebar_jp()">☰</button>
        <div class="page-layout">
            <div class="sidebar" id="sidebar_jp">
                <div class="sidebar-header"><h3>Nippon Select</h3><span class="close-btn" onclick="toggleSidebar_jp()">✖</span></div>
                <div class="saved-list-container" id="savedList_jp"></div>
                <p id="emptyMsg_jp" style="color: #A0A0A0; font-size: 14px; text-align: center; margin-top: 30px;">目前尚無紀錄</p>
            </div>
            <div class="sidebar-spacer" id="sidebarSpacer_jp"></div>
            <div class="main-container">
                <div class="calculator">
                    <h2>Nippon Select 日本代購</h2>
                    <div class="input-group"><label>1. 選擇商品幣別</label><select id="currency_jp" onchange="updateAllCurrencyCalcs_jp()"><option value="0.21">日幣 ¥ : 原價 × 0.21</option><option value="0.22">日幣 ¥ : 原價 × 0.22</option></select></div>
                    <div class="input-group"><label>2. 商品原價 (¥)</label><div class="inline-calc-container"><input type="number" id="price_jp" placeholder="輸入日幣原價" oninput="calculateItemPrice_jp()" inputmode="decimal"><span id="itemPriceDisplay_jp" class="inline-calc-result">= 0 元</span></div></div>
                    <div class="input-group">
                        <label>3. 利潤</label>
                        <div class="option-group">
                            <label class="option-label"><input type="radio" name="feeType_jp" value="percent" checked> 按比例 (%)</label>
                            <label class="option-label"><input type="radio" name="feeType_jp" value="fixed"> 固定台幣</label>
                        </div>
                        <input type="number" id="serviceFee_jp" placeholder="輸入比例 或 固定金額" inputmode="decimal">
                    </div>
                    <div class="input-group"><label>4. 商品重量 (g)</label><div class="inline-calc-container"><input type="number" id="weight_jp" placeholder="商品重量" oninput="calculateWeightFee_jp()" inputmode="decimal"><span id="weightFeeDisplay_jp" class="inline-calc-result">= 0 元</span></div><span style="font-size: 12px; color: #A0A0A0; margin-top: 5px; display: block;">預估國際運費：克重 × 0.25</span></div>
                    
                    <div class="input-group">
                        <label>5. 台灣 / 日本 國內運費</label>
                        <div class="option-group">
                            <label class="option-label"><input type="checkbox" class="round-checkbox" id="useLocalShip_jp" checked onchange="toggleShipDisplay_jp()"> 台灣運費</label>
                            <label class="option-label"><input type="checkbox" class="round-checkbox" id="useJapanShip_jp" onchange="toggleShipDisplay_jp()"> 日本運費</label>
                        </div>
                        <div class="ship-flex-row">
                            <div id="localShipBox_jp">
                                <select id="localShipping_jp"><option value="60">7-11 店到店 60</option><option value="40">郵局(小) 40</option><option value="80">郵局(大) 80</option></select>
                            </div>
                            <div id="japanShipBox_jp" class="hidden-box">
                                <div class="inline-calc-container"><input type="number" id="japanShipping_jp" placeholder="匯率×0.21" oninput="calculateJapanPrice_jp()" inputmode="decimal"><span id="japanPriceDisplay_jp" class="inline-calc-result">= 0 元</span></div>
                            </div>
                        </div>
                    </div>
                    <button class="primary-btn" onclick="calculateTotal_jp()">立即計算總價</button>
                </div>
                <div class="result waiting" id="resultBox_jp">
                    <h3>📝 報價明細 (台幣)</h3>
                    <p><span>商品折合台幣：</span> <span id="resItemPrice_jp">0 元</span></p>
                    <p><span>國際運費：</span> <span id="resIntlShipping_jp">0 元</span></p>
                    <p id="rowJapanShip_jp" class="hidden-box"><span>日本運費：</span> <span id="resJapanShipping_jp">0 元</span></p>
                    <p id="rowLocalShip_jp"><span>台灣運費：</span> <span id="resLocalShipping_jp">0 元</span></p>
                    <p><span>利潤：</span> <span id="resServiceFee_jp">0 元</span></p>
                    <hr>
                    <p class="cost-price" style="font-size: 18px; font-weight: bold;"><span>成本：</span> <span id="resCost_jp">0 元</span></p>
                    <p class="total-price"><span>賣價：</span> <span id="resTotal_jp">0 元</span></p>
                    <div class="save-section"><input type="text" id="quoteName_jp" placeholder="儲存報價名稱"><button class="save-btn" id="saveBtn_jp" onclick="saveToSidebar_jp()" disabled>💾 儲存至記事本</button></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzUzXG8Bp0Xb725QtcZHwht89P-N8JceKHnpyHg6UAVr7WmPnw6OBVLenQ7RcYC_z5n/exec";
        let isSyncLocked = false;

        function syncToCloud(mode, dataArray) {
            isSyncLocked = true; 
            fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify({ mode: mode, data: dataArray }),
                headers: { 'Content-Type': 'text/plain;charset=utf-8' }
            }).then(() => {
                setTimeout(() => { isSyncLocked = false; }, 4000);
            }).catch(err => { 
                console.log("雲端同步失敗", err);
                isSyncLocked = false;
            });
        }

        let lastScrollTop = 0;
        window.addEventListener('scroll', () => {
            let st = window.pageYOffset || document.documentElement.scrollTop;
            const historyBtnJp = document.getElementById('historyBtn_jp');
            const viewBtnJp = document.getElementById('viewSwitchBtn_jp');
            if (st > 10) { viewBtnJp.classList.add('top-hidden'); } else { viewBtnJp.classList.remove('top-hidden'); }
            if (st > lastScrollTop && st > 50) { historyBtnJp.classList.add('scroll-hidden'); } else if (st < lastScrollTop) { historyBtnJp.classList.remove('scroll-hidden'); }
            lastScrollTop = st <= 0 ? 0 : st;
        }, { passive: true });

        function updateAllCurrencyCalcs_jp() {
            const rate = document.getElementById('currency_jp').value;
            localStorage.setItem('nipponSelectRate', rate);
            document.getElementById('japanShipping_jp').placeholder = `匯率×${rate}`;
            calculateItemPrice_jp(); calculateJapanPrice_jp();
            document.getElementById('saveBtn_jp').disabled = true;
        }
        function toggleShipDisplay_jp() {
            document.getElementById('localShipBox_jp').classList.toggle('hidden-box', !document.getElementById('useLocalShip_jp').checked);
            document.getElementById('japanShipBox_jp').classList.toggle('hidden-box', !document.getElementById('useJapanShip_jp').checked);
            document.getElementById('saveBtn_jp').disabled = true;
        }
        function calculateItemPrice_jp() {
            const rate = parseFloat(document.getElementById('currency_jp').value);
            const price = parseFloat(document.getElementById('price_jp').value) || 0;
            document.getElementById('itemPriceDisplay_jp').innerText = '= ' + Math.round(price * rate) + ' 元';
        }
        function calculateWeightFee_jp() {
            const weight = parseFloat(document.getElementById('weight_jp').value) || 0;
            document.getElementById('weightFeeDisplay_jp').innerText = '= ' + Math.round(weight * 0.25) + ' 元';
        }
        function calculateJapanPrice_jp() {
            const rate = parseFloat(document.getElementById('currency_jp').value);
            const jShip = parseFloat(document.getElementById('japanShipping_jp').value) || 0;
            document.getElementById('japanPriceDisplay_jp').innerText = '= ' + Math.round(jShip * rate) + ' 元';
        }
        function calculateTotal_jp() {
            const rate = parseFloat(document.getElementById('currency_jp').value);
            const price = parseFloat(document.getElementById('price_jp').value) || 0;
            const feeType = document.querySelector('input[name="feeType_jp"]:checked').value;
            const serviceInput = parseFloat(document.getElementById('serviceFee_jp').value) || 0;
            const weight = parseFloat(document.getElementById('weight_jp').value) || 0;
            let local = document.getElementById('useLocalShip_jp').checked ? parseFloat(document.getElementById('localShipping_jp').value) : 0;
            let japan = document.getElementById('useJapanShip_jp').checked ? Math.round(parseFloat(document.getElementById('japanShipping_jp').value || 0) * rate) : 0;
            let itemTWD = Math.round(price * rate);
            let intlTWD = Math.round(weight * 0.25);
            let serviceTWD = (feeType === 'percent') ? Math.round(itemTWD * (serviceInput / 100)) : serviceInput;
            const cost = itemTWD + intlTWD + local + japan;
            const total = cost + serviceTWD;
            document.getElementById('resItemPrice_jp').innerText = itemTWD + ' 元';
            document.getElementById('resIntlShipping_jp').innerText = intlTWD + ' 元';
            document.getElementById('resLocalShipping_jp').innerText = local + ' 元';
            document.getElementById('resServiceFee_jp').innerText = serviceTWD + ' 元';
            document.getElementById('resCost_jp').innerText = cost + ' 元';
            document.getElementById('resTotal_jp').innerText = total + ' 元';
            document.getElementById('rowJapanShip_jp').className = japan > 0 ? '' : 'hidden-box';
            if(japan > 0) document.getElementById('resJapanShipping_jp').innerText = japan + ' 元';
            document.getElementById('resultBox_jp').classList.remove('waiting');
            document.getElementById('saveBtn_jp').disabled = false;
            const resBox = document.getElementById('resultBox_jp');
            resBox.classList.remove('result-animate');
            void resBox.offsetWidth; resBox.classList.add('result-animate');
            setTimeout(() => { resBox.scrollIntoView({ behavior: 'smooth', block: 'center' }); }, 100);
        }

        function toggleViewMode_jp() {
            const btn = document.getElementById('viewSwitchBtn_jp');
            if (btn.innerHTML.includes('手機版')) {
                document.body.classList.remove('force-desktop'); document.body.classList.add('force-mobile');
                document.getElementById('viewportMeta').setAttribute('content', 'width=device-width, initial-scale=1.0');
                btn.innerHTML = '💻 電腦版';
            } else {
                document.body.classList.add('force-desktop'); document.body.classList.remove('force-mobile');
                document.getElementById('viewportMeta').setAttribute('content', 'width=1100');
                btn.innerHTML = '📱 手機版';
            }
        }

        function getProfit(costStr, totalStr) {
            const c = parseInt(costStr.replace(/[^0-9]/g, '')) || 0;
            const t = parseInt(totalStr.replace(/[^0-9]/g, '')) || 0;
            return t - c;
        }

        function updateProfitDisplay(el) {
            const card = el.closest('.saved-item');
            const costStr = card.querySelector('.quote-cost').textContent;
            const totalStr = card.querySelector('.quote-total').textContent;
            const profitVal = getProfit(costStr, totalStr);
            card.querySelector('.quote-profit-val').textContent = profitVal;
        }

        function saveToSidebar_jp() {
            const name = document.getElementById('quoteName_jp').value.trim();
            if(!name) return alert("請輸入報價名稱");
            const id = 'save_jp_' + Date.now();
            renderSavedItem_jp(id, name, "成本："+document.getElementById('resCost_jp').innerText, "賣價："+document.getElementById('resTotal_jp').innerText, true);
            document.getElementById('emptyMsg_jp').style.display = 'none';
            document.getElementById('quoteName_jp').value = '';
            if (!document.getElementById('sidebar_jp').classList.contains('open')) toggleSidebar_jp();
            document.getElementById('saveBtn_jp').disabled = true;
            saveOrderToStorage_jp();
        }

        function renderSavedItem_jp(id, name, cost, total, prepend) {
            const profit = getProfit(cost, total);
            const div = document.createElement('div'); div.className = 'saved-item'; div.id = id;
            div.innerHTML = `
                <div class="drag-handle">☰</div>
                <div class="item-content">
                    <div class="item-title-row">
                        <strong class="editable-text quote-name" contenteditable="true" onblur="saveOrderToStorage_jp()" onkeydown="handleEnter(event)">${name}</strong>
                        <div class="item-action-btns">
                            <span class="copy-btn" onclick="copyItem('${id}')">📄</span>
                            <span class="del-btn" onclick="deleteItem_jp('${id}')">✖</span>
                        </div>
                    </div>
                    <div class="item-price-row">
                        <span class="editable-text quote-cost" contenteditable="true" oninput="updateProfitDisplay(this)" onblur="saveOrderToStorage_jp()" onkeydown="handleEnter(event)">${cost}</span>
                        <div class="sell-profit-group">
                            <span class="editable-text quote-total" contenteditable="true" oninput="updateProfitDisplay(this)" onblur="saveOrderToStorage_jp()" onkeydown="handleEnter(event)">${total}</span>
                            <span class="quote-profit-label">利潤：<span class="quote-profit-val">${profit}</span></span>
                        </div>
                    </div>
                </div>`;
            const list = document.getElementById('savedList_jp');
            if(prepend) list.insertBefore(div, list.firstChild); else list.appendChild(div);
        }

        function deleteItem_jp(id) { document.getElementById(id).remove(); if(document.querySelectorAll('#app-jp .saved-item').length === 0) document.getElementById('emptyMsg_jp').style.display = 'block'; saveOrderToStorage_jp(); }
        function saveOrderToStorage_jp() {
            setTimeout(() => {
                const items = [];
                document.querySelectorAll('#app-jp .saved-item').forEach(el => { 
                    items.push({ id: el.id, name: el.querySelector('.quote-name').textContent, cost: el.querySelector('.quote-cost').textContent, total: el.querySelector('.quote-total').textContent }); 
                });
                localStorage.setItem('nipponSelectQuotes', JSON.stringify(items));
                syncToCloud('jp', items); 
            }, 0);
        }
        function toggleSidebar_jp() { document.getElementById('sidebar_jp').classList.toggle('open'); document.getElementById('sidebarSpacer_jp').classList.toggle('open'); document.getElementById('historyBtn_jp').classList.toggle('hidden'); }
        function copyItem(id) {
            const el = document.getElementById(id);
            const text = `${el.querySelector('.quote-name').textContent}\n${el.querySelector('.quote-cost').textContent}\n${el.querySelector('.quote-total').textContent}`;
            navigator.clipboard.writeText(text).then(() => alert('已複製報價！'));
        }

        let isTypingIME = false;
        document.addEventListener('compositionstart', () => { isTypingIME = true; });
        document.addEventListener('compositionend', () => { isTypingIME = false; });
        function handleEnter(e) { if (isTypingIME || e.isComposing || e.keyCode === 229) return; if (e.key === 'Enter') { e.preventDefault(); e.target.blur(); } }

        function fetchCloudDataBackground() {
            if (isSyncLocked) return;
            fetch(API_URL + "?t=" + new Date().getTime(), { cache: 'no-store' })
                .then(res => res.json())
                .then(data => {
                    if (isSyncLocked) return;
                    const isEditing = document.activeElement && document.activeElement.classList.contains('editable-text');
                    if (data.jp) {
                        const newJpStr = JSON.stringify(data.jp);
                        const oldJpStr = localStorage.getItem('nipponSelectQuotes') || '[]';
                        if (newJpStr !== oldJpStr && !isEditing) {
                            localStorage.setItem('nipponSelectQuotes', newJpStr);
                            document.getElementById('savedList_jp').innerHTML = ''; 
                            data.jp.forEach(q => renderSavedItem_jp(q.id, q.name, q.cost, q.total, false));
                            document.getElementById('emptyMsg_jp').style.display = data.jp.length > 0 ? 'none' : 'block';
                        }
                    }
                })
                .catch(err => console.log("背景更新維持本機", err));
        }

        window.addEventListener('DOMContentLoaded', () => {
            if (window.innerWidth > 900) {
                document.body.classList.add('force-desktop');
                document.getElementById('viewportMeta').setAttribute('content', 'width=1100');
                document.getElementById('viewSwitchBtn_jp').innerHTML = '📱 手機版';
            }
            const jpData = JSON.parse(localStorage.getItem('nipponSelectQuotes') || '[]');
            jpData.forEach(q => renderSavedItem_jp(q.id, q.name, q.cost, q.total, false));
            if(jpData.length > 0) document.getElementById('emptyMsg_jp').style.display = 'none';
            const rateJp = localStorage.getItem('nipponSelectRate');
            if(rateJp) { document.getElementById('currency_jp').value = rateJp; document.getElementById('japanShipping_jp').placeholder = `匯率×${rateJp}`; }
            fetchCloudDataBackground();
            setInterval(fetchCloudDataBackground, 5000);
        });

        document.addEventListener('keydown', (e) => {
            if (isTypingIME || e.isComposing || e.keyCode === 229) return;
            if (e.key === 'Enter') {
                const activeEl = document.activeElement;
                if (activeEl.classList.contains('editable-text')) return;
                if(activeEl.id === 'quoteName_jp') { 
                    if(!document.getElementById('saveBtn_jp').disabled) saveToSidebar_jp(); 
                } else { 
                    calculateTotal_jp(); 
                } 
            }
        });
    </script>
</body>
</html>
